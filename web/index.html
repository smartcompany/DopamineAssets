<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="dopamine_assets">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>dopamine_assets</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* Flutter 첫 프레임 전 기본 흰 화면 방지 + 로딩 표시 */
    html, body {
      height: 100%;
      margin: 0;
      background: #221039;
      color: #e8e0f5;
    }
    #flutter-loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-size: 14px;
      letter-spacing: 0.02em;
      pointer-events: none;
      z-index: 99999;
    }
    #flutter-loading .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.15);
      border-top-color: #ffca28;
      border-radius: 50%;
      animation: flutter-spin 0.85s linear infinite;
    }
    @keyframes flutter-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="flutter-loading" aria-live="polite" aria-busy="true">
    <div class="spinner" role="presentation"></div>
    <span>Loading…</span>
  </div>
  <script>
    (function () {
      try {
        var url = new URL(window.location.href);
        if (url.pathname !== '/communityPost') return;

        var postId = (url.searchParams.get('postId') || '').trim();
        if (!postId) return;

        // 모바일 웹 진입 시 앱 스킴으로 우선 시도.
        // 앱 미설치/차단 시에는 현재 웹 URL에 그대로 머무르며 Flutter 페이지가 로드된다.
        var ua = navigator.userAgent || '';
        var isMobile = /iPhone|iPad|iPod|Android/i.test(ua);
        if (!isMobile) return;

        var scheme =
          'dopamineassets://communityPost?postId=' +
          encodeURIComponent(postId);
        var switchedToApp = false;
        var onHidden = function () {
          if (document.visibilityState === 'hidden') {
            switchedToApp = true;
          }
        };
        document.addEventListener('visibilitychange', onHidden, { passive: true });

        // 설치 여부 사전 체크 API는 없다.
        // 페이지를 이동시키는 assign/location 방식은 미설치 시 에러 페이지(흰화면)로 갈 수 있어
        // 숨김 iframe으로 앱 스킴만 "시도"한다. 실패하면 현재 웹 URL에 그대로 머문다.
        var iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.setAttribute('aria-hidden', 'true');
        iframe.src = scheme;
        document.body.appendChild(iframe);

        // 앱 미설치/차단 시 현재 URL(웹)에 머무른다. 추가 리다이렉트는 하지 않는다.
        setTimeout(function () {
          document.removeEventListener('visibilitychange', onHidden);
          if (iframe && iframe.parentNode) {
            iframe.parentNode.removeChild(iframe);
          }
          if (!switchedToApp) {
            // no-op: stay on web page
          }
        }, 1200);
      } catch (_) {}
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    (function () {
      function removeLoading() {
        var el = document.getElementById('flutter-loading');
        if (el && el.parentNode) el.parentNode.removeChild(el);
      }
      function onFirstFrame() {
        clearTimeout(fallbackTimer);
        removeLoading();
        window.removeEventListener('flutter-first-frame', onFirstFrame);
      }
      var fallbackTimer = setTimeout(onFirstFrame, 20000);
      window.addEventListener('flutter-first-frame', onFirstFrame);
    })();
  </script>
</body>
</html>
