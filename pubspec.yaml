name: dopamine_assets
description: "Dopamine Assets — volatile-asset feed (US/KR stocks, crypto, commodities)."
publish_to: "none"

version: 1.0.3+5

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  translator: ^1.0.4+1
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2
  webview_flutter: ^4.10.0
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  firebase_messaging: ^16.1.0
  provider: ^6.1.2
  google_mobile_ads: ^5.1.0
  share_lib:
    git:
      url: https://github.com/smartcompany/flutter_share_lib.git
      ref: main
  http_parser: ^4.1.2
  image_picker: ^1.2.1
  firebase_analytics: ^12.2.0
  firebase_crashlytics: ^5.1.0
  crypto: ^3.0.7
  kakao_flutter_sdk_common: ^1.10.0
  go_router: ^16.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/banned_words.json
