# Git 저장소 루트 = 이 client 폴더 일 때 사용합니다.
# Flutter 웹은 Actions 에서 빌드 후 `build/web` 만 Vercel 에 배포합니다.
#
# Secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# → GitHub "Environment secrets" 로만 넣었다면 아래 job 의 environment 이름과 동일해야 합니다.
#
# Vercel 이 Git 푸시로 별도 빌드까지 돌리면 이중 배포될 수 있으니,
# 이 워크플로만 쓸 경우 해당 프로젝트의 자동 Git 빌드 끄는 것을 권장합니다.
name: Flutter Web Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build and Deploy Flutter Web
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies (git share_lib, no local overrides)
        run: |
          rm -f pubspec_overrides.yaml
          flutter pub get

      - name: Build Flutter Web
        run: flutter build web --release

      - name: Copy vercel.json for routing
        run: cp vercel.json build/web/

      # secret 미설정 시 amondnet/vercel-action 은 "vercel-token not supplied" 만 던져서 원인 파악이 어렵다.
      - name: Check Vercel secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          missing=
          [ -z "$VERCEL_TOKEN" ] && missing="${missing} VERCEL_TOKEN"
          [ -z "$VERCEL_ORG_ID" ] && missing="${missing} VERCEL_ORG_ID"
          [ -z "$VERCEL_PROJECT_ID" ] && missing="${missing} VERCEL_PROJECT_ID"
          if [ -n "$missing" ]; then
            echo "::error::GitHub Actions secrets 가 비어 있습니다.$missing"
            echo "Repository secrets 또는 Environment(Production) secrets 에 위 이름으로 등록하세요."
            echo "Environment secrets 만 쓰는 경우 이 job 에 environment: Production 이 있어야 합니다."
            exit 1
          fi

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-args: "build/web --prod"
          vercel-project-name: dopamine-assets
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
